name: Verify app and build restaurant data

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install frontend dependencies
        run: npm ci

      - name: Install data dependencies
        run: python -m pip install -r requirements.txt

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check api/config.js
          node --check api/maps.js

      - name: Build JSON and quality report
        run: python scripts/build_data.py

      - name: Run data tests
        run: npm test

      - name: Require generated files in pull requests
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- restaurants.json data/quality-report.json

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mobile browser smoke test
        run: npm run test:smoke

  regenerate-data:
    if: github.event_name == 'push'
    needs: verify-app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install data dependencies
        run: python -m pip install -r requirements.txt

      - name: Build JSON and quality report
        run: python scripts/build_data.py

      - name: Commit generated files on main
        shell: bash
        run: |
          if git diff --quiet -- restaurants.json data/quality-report.json; then
            echo "Generated data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add restaurants.json data/quality-report.json
          git commit -m "chore(data): regenerate restaurant data"
          git push
